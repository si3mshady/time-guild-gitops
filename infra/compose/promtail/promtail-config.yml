server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: app

  # Nginx JSON Access & Security Log Scraper
  - job_name: nginx-json-analytics
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*nginx.*)"
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*nginx.*)"
        target_label: app
    pipeline_stages:
      - json:
          expressions:
            remote_addr: remote_addr
            request_method: request_method
            request_uri: request_uri
            status: status
            request_time: request_time
            ssl_protocol: ssl_protocol
            waf_blocked: waf_blocked
            waf_rule: waf_rule
            rate_limit_blocked: rate_limit_blocked
      - labels:
          status:
          request_method:
          waf_blocked:
          rate_limit_blocked:
          ssl_protocol:
      - metrics:
          nginx_requests_total:
            type: Counter
            description: "Total HTTP/HTTPS requests processed by Nginx"
            source: status
            config:
              action: inc
          nginx_waf_blocks_total:
            type: Counter
            description: "Total security probes blocked by WAF"
            source: waf_blocked
            config:
              value: "1"
              action: inc
          nginx_rate_limit_blocks_total:
            type: Counter
            description: "Total requests blocked by rate limits"
            source: rate_limit_blocked
            config:
              value: "1"
              action: inc
