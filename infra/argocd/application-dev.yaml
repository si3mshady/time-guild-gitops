apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: timeguild-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Points to the GitOps configuration repository
    repoURL: 'https://github.com/si3mshady/time-guild-gitops.git'
    targetRevision: HEAD
    path: infra/helm/timeguild
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: timeguild-dev
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: timeguild-dev-secrets
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
