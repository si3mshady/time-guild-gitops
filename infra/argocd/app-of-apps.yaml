apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: timeguild-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/si3mshady/time-guild-gitops.git'
    targetRevision: HEAD
    path: infra/argocd
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
