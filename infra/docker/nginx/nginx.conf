# ==============================================================================
# Time Guild Modern Nginx Edge Reverse Proxy & Security Configuration
# Reference: Latest Nginx Documentation (https://nginx.org/en/docs/)
# ==============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance & I/O Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version for security

    # Maximum Payload & Buffer Settings
    client_max_body_size 16M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ==========================================================================
    # Structured JSON Analytics & Security Log Format (Promtail / Loki Ready)
    # ==========================================================================
    log_format json_analytics escape=json
      '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"server_protocol":"$server_protocol",'
        '"status":"$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"host":"$host",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher",'
        '"waf_blocked":"$waf_blocked",'
        '"waf_rule":"$waf_rule",'
        '"rate_limit_blocked":"$rate_limit_blocked"'
      '}';

    access_log /var/log/nginx/access.log json_analytics;
    error_log /var/log/nginx/error.log warn;

    # Initialize Custom Security Variables
    map $status $waf_blocked {
        403 1;
        default 0;
    }

    map $status $rate_limit_blocked {
        429 1;
        default 0;
    }

    map $uri $waf_rule {
        default "none";
    }

    # ==========================================================================
    # SSL/TLS Security Best Practices
    # ==========================================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Include Rate Limiting & WAF Rule Configurations
    include /etc/nginx/conf.d/rate-limiting.conf;
    include /etc/nginx/conf.d/waf-rules.conf;
    include /etc/nginx/conf.d/timeguild-proxy.conf;
}
