# ==============================================================================
# Nginx Rate Limiting Zones Configuration
# Reference: Nginx Rate Limiting (https://www.nginx.com/blog/rate-limiting-nginx/)
# ==============================================================================

# Key rate limit zones by client IP ($binary_remote_addr uses 64 bytes per state)
# Zone size 10m stores ~160,000 IP addresses in shared memory.

# 1. High-Security Auth Zone: Protects signin/signup routes from brute-force probes
limit_req_zone $binary_remote_addr zone=auth_limit_zone:10m rate=5r/s;

# 2. Financial & Payment Zone: Protects Stripe checkout & AI agent scheduling endpoints
limit_req_zone $binary_remote_addr zone=checkout_limit_zone:10m rate=10r/s;

# 3. General API Zone: General limit for API data queries
limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=30r/s;

# Return HTTP 429 Too Many Requests when rate limits are exceeded
limit_req_status 429;
limit_conn_status 429;
