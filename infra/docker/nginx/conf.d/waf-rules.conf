# ==============================================================================
# Nginx Web Application Firewall (WAF) & Security Filters
# Filters common OWASP attack vectors (SQLi, XSS, Path Traversal, Scanners)
# ==============================================================================

# 1. SQL Injection (SQLi) Protection Filter
map $request_uri $sqli_attack {
    default 0;
    "~*select.*from" 1;
    "~*union.*select" 1;
    "~*insert.*into" 1;
    "~*delete.*from" 1;
    "~*drop.*table" 1;
    "~*information_schema" 1;
    "~*exec(\s|\+)+(s|x)p" 1;
    "~*or\s+1=1" 1;
    "~*benchmark\(" 1;
    "~*sleep\(" 1;
}

# 2. Cross-Site Scripting (XSS) Protection Filter
map $request_uri $xss_attack {
    default 0;
    "~*<script" 1;
    "~*javascript:" 1;
    "~*onload=" 1;
    "~*onerror=" 1;
    "~*eval\(" 1;
    "~*document\.cookie" 1;
}

# 3. Path Traversal & Probe Protection Filter
map $request_uri $traversal_attack {
    default 0;
    "~*\.\./" 1;
    "~*\.env" 1;
    "~*wp-config" 1;
    "~*wp-admin" 1;
    "~*\.git" 1;
    "~*\.htaccess" 1;
    "~*/etc/passwd" 1;
}

# 4. Malicious User-Agent / Scanner Filter
map $http_user_agent $bad_bot {
    default 0;
    "~*sqlmap" 1;
    "~*nikto" 1;
    "~*dirbuster" 1;
    "~*nmap" 1;
    "~*masscan" 1;
    "~*w3af" 1;
    "~*acunetix" 1;
    "~*havij" 1;
}
