# ==============================================================================
# Time Guild Edge Ingress Proxy & TLS Server Block Configuration
# Handles HTTP-to-HTTPS redirect, Wildcard Subdomain TLS, WAF & Rate Limiting
# ==============================================================================

# Downstream App Upstream Target
upstream nextjs_backend {
    server app:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# 1. HTTP Listener (Port 80): Automatic HTTPS Redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name timeguild.local *.timeguild.local localhost;

    # Nginx Stub Status for Prometheus Exporter Scrapes
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny all;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Listener (Port 443): TLS Termination & Proxy Block
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name timeguild.local *.timeguild.local localhost;

    # TLS Certificate Paths
    ssl_certificate /etc/nginx/certs/timeguild.crt;
    ssl_certificate_key /etc/nginx/certs/timeguild.key;

    # ==========================================================================
    # Web Application Firewall (WAF) Rule Evaluator
    # ==========================================================================
    if ($sqli_attack = 1) {
        return 403;
    }
    if ($xss_attack = 1) {
        return 403;
    }
    if ($traversal_attack = 1) {
        return 403;
    }
    if ($bad_bot = 1) {
        return 403;
    }

    # Proxy Header Forwarding Settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_read_timeout 90s;
    proxy_connect_timeout 60s;

    # Rate-Limited Authentication Routes
    location /api/auth/ {
        limit_req zone=auth_limit_zone burst=10 nodelay;
        proxy_pass http://nextjs_backend;
    }

    # Rate-Limited Stripe Checkout & Agent Scheduling Routes
    location ~* ^/api/(stripe|agent)/ {
        limit_req zone=checkout_limit_zone burst=15 nodelay;
        proxy_pass http://nextjs_backend;
    }

    # General API Routes Rate Limiting
    location /api/ {
        limit_req zone=api_limit_zone burst=30 nodelay;
        proxy_pass http://nextjs_backend;
    }

    # Catch-all Route for Web Pages & Assets
    location / {
        proxy_pass http://nextjs_backend;
    }
}
