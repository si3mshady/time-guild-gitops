apiVersion: v1
kind: ConfigMap
metadata:
  name: timeguild-apm-tracing-dashboard
  labels:
    grafana_dashboard: "1"
data:
  timeguild-apm-tracing-dashboard.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": 4,
      "links": [
        {
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "targetBlank": true,
          "title": "Jaeger Tracing UI",
          "type": "link",
          "url": "http://localhost:16686"
        }
      ],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 0 },
          "id": 400,
          "title": "⚡ OpenTelemetry Distributed Tracing & Unified APM Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "description": "Total cumulative count of OpenTelemetry spans exported via OTLP to Jaeger.",
              "displayName": "Total Spans Exported",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 2 },
          "id": 401,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_trace_spans_total)",
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Total Spans",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "description": "95th percentile latency of Stripe Express creator payout transfer execution (stripe.transfers.create).",
              "displayName": "Creator Payout (P95)",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.5 }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 2 },
          "id": 402,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"creator_payout\"})",
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Payout Latency",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "description": "95th percentile latency of DeepSeek / LangGraph multi-agent scheduling graph execution.",
              "displayName": "AI Scheduling (P95)",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.4 },
                  { "color": "red", "value": 0.8 }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 2 },
          "id": 403,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"agent_scheduling\"})",
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Agent Latency",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "description": "95th percentile latency of Stripe Checkout session creation and slot locking.",
              "displayName": "Stripe Checkout (P95)",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 2 },
          "id": 404,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "value_and_name"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"checkout\"})",
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Checkout Latency",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 7 },
          "id": 405,
          "title": "📈 Transaction Latency Trends & Cross-Journey Comparison",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto"
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 14, "x": 0, "y": 9 },
          "id": 406,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"creator_payout\"})",
              "legendFormat": "Creator Payout Transfer",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"agent_scheduling\"})",
              "legendFormat": "AI Agent Scheduling",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"checkout\"})",
              "legendFormat": "Stripe Checkout Session",
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"webhook\"})",
              "legendFormat": "Stripe Webhook Processing",
              "refId": "D"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"onboarding\"})",
              "legendFormat": "Creator K8s Onboarding",
              "refId": "E"
            }
          ],
          "title": "P95 Transaction Latency Over Time (by User Journey)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.5 }
                ]
              },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 10, "x": 14, "y": 9 },
          "id": 407,
          "options": {
            "displayMode": "lcd",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"agent_scheduling\"})",
              "instant": true,
              "legendFormat": "AI Agent Scheduling",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"creator_payout\"})",
              "instant": true,
              "legendFormat": "Creator Payout Transfer",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"checkout\"})",
              "instant": true,
              "legendFormat": "Stripe Checkout Session",
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"onboarding\"})",
              "instant": true,
              "legendFormat": "Creator K8s Onboarding",
              "refId": "D"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "max(timeguild_span_duration_seconds_p95{journey=\"webhook\"})",
              "instant": true,
              "legendFormat": "Stripe Webhook Processing",
              "refId": "E"
            }
          ],
          "title": "Span Latency Comparison by Journey",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 17 },
          "id": 408,
          "title": "🔎 Trace & Log Correlation (Loki Log Stream with Trace IDs)",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "Loki" },
          "fieldConfig": {
            "defaults": {
              "description": "Real-time Loki log stream filtered for structured [OBSERVABILITY] events containing active trace_id and span_id correlation parameters."
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 19 },
          "id": 409,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showLabels": true,
            "showLineNumbers": true,
            "showWrap": true,
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "Loki" },
              "expr": "{job=\"kubernetes-pods\"} |= \"[OBSERVABILITY]\"",
              "refId": "A"
            }
          ],
          "title": "Structured Log Stream with OpenTelemetry trace_id & span_id",
          "type": "logs"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["timeguild", "apm", "opentelemetry", "tracing"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": { "refresh_intervals": ["5s", "10s", "30s", "1m"] },
      "timezone": "browser",
      "title": "Time Guild - OpenTelemetry APM & Distributed Tracing",
      "uid": "timeguild-apm-tracing",
      "version": 4
    }
