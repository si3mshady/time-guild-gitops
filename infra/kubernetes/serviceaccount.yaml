apiVersion: v1
kind: ServiceAccount
metadata:
  name: timeguild-sa
  namespace: timeguild-prod
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: timeguild-role
  namespace: timeguild-prod
rules:
  # The application does not need cluster API access.
  # We define an empty rules list to enforce zero permissions.
  []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: timeguild-rolebinding
  namespace: timeguild-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: timeguild-role
subjects:
  - kind: ServiceAccount
    name: timeguild-sa
    namespace: timeguild-prod
