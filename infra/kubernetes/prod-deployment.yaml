apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeguild-prod
  namespace: timeguild-prod
  labels:
    app.kubernetes.io/instance: timeguild-prod
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: timeguild
    app.kubernetes.io/version: 1.0.0
    component: server
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: timeguild-prod
      app.kubernetes.io/name: timeguild
      component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: timeguild-prod
        app.kubernetes.io/name: timeguild
        component: server
    spec:
      serviceAccountName: timeguild-sa
      securityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsNonRoot: false
        runAsUser: 1001
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1001:1001 /app/data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
      containers:
        - name: nextjs
          image: si3mshady/time-guild:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 1001
          ports:
            - name: app-http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: timeguild-prod-config
            - secretRef:
                name: timeguild-prod-secrets
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /
              port: app-http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /
              port: app-http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: app-http
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config-vol
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-tmp
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /tmp
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-config-vol
          configMap:
            name: timeguild-nginx-config
        - name: db-storage
          persistentVolumeClaim:
            claimName: timeguild-prod-db-pvc
