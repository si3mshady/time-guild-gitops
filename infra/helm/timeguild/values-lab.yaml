replicaCount: 2

ingress:
  annotations:
    cert-manager.io/cluster-issuer: null
  hosts:
    - host: lab.timeguild.xyz
      paths:
        - path: /
          pathType: Prefix
    - host: "*.lab.timeguild.xyz"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - lab.timeguild.xyz
        - "*.lab.timeguild.xyz"

persistence:
  type: hostPath
  hostPath: "/var/lib/timeguild/data-lab"

podSecurityContext:
  runAsNonRoot: false

networkPolicy:
  enabled: false
