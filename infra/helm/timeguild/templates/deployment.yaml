apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "timeguild.fullname" . }}
  labels:
    {{- include "timeguild.labels" . | nindent 4 }}
    component: server
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "timeguild.selectorLabels" . | nindent 6 }}
      component: server
  template:
    metadata:
      labels:
        {{- include "timeguild.selectorLabels" . | nindent 8 }}
        component: server
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "timeguild.fullname" .) }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.persistence.enabled }}
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1001:1001 /app/data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
      {{- end }}
      containers:
        - name: nextjs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{/*
          MENTORING NOTE (Port Mismatch):
          Why does containerPort use `.Values.service.port` instead of hardcoded 3000?
          Our Next.js application receives the PORT environment variable from the ConfigMap, 
          which resolves to the Service Port (80). Therefore, the Next.js process starts and 
          listens on port 80.
          
          If the containerPort here is hardcoded to 3000, Kubernetes named port "http" maps to 3000. 
          When startup/liveness/readiness probes check the named port "http" (3000), they fail because 
          nothing is listening there, resulting in continuous RunContainerError or CrashLoopBackOff restarts.
          Mapping containerPort to the dynamic service port solves this mismatch.
          */}}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "timeguild.fullname" . }}-config
            - secretRef:
                name: {{ include "timeguild.fullname" . }}-secrets
          {{- if .Values.persistence.enabled }}
          {{/*
          MENTORING NOTE (SQLite subPath Mount Issue):
          Why did we change mountPath to `/app/data` (directory mount) and remove `subPath`?
          When you mount a file using `subPath` (like `time_worth.db`) from a Persistent Volume (PV), 
          Kubernetes expects that file to exist. If the volume is empty (newly provisioned), 
          Kubernetes creates a DIRECTORY at the destination path named `time_worth.db` on the node, 
          which then fails to bind as a file in the container.
          
          To solve this cleanly, we mount the directory `/app/data` to the PV and define the environment 
          variable `DB_PATH: /app/data/time_worth.db`. The application automatically creates the SQLite 
          database file inside that directory, avoiding mounting errors.
          */}}
          volumeMounts:
            - name: db-storage
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: db-storage
          {{- if eq .Values.persistence.type "hostPath" }}
          hostPath:
            path: {{ .Values.persistence.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "timeguild.fullname" . }}-db-pvc
          {{- end }}
      {{- end }}
