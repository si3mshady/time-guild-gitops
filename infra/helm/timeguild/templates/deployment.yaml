apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "timeguild.fullname" . }}
  labels:
    {{- include "timeguild.labels" . | nindent 4 }}
    component: server
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "timeguild.selectorLabels" . | nindent 6 }}
      component: server
  template:
    metadata:
      labels:
        {{- include "timeguild.selectorLabels" . | nindent 8 }}
        component: server
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "timeguild.fullname" .) }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.persistence.enabled }}
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1001:1001 /app/data"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
      {{- end }}
      containers:
        - name: nextjs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{/*
          MENTORING NOTE (Port Mismatch):
          Why does containerPort use `.Values.service.port` instead of hardcoded 3000?
          Our Next.js application receives the PORT environment variable from the ConfigMap, 
          which resolves to the Service Port (80). Therefore, the Next.js process starts and 
          listens on port 80.
          
          If the containerPort here is hardcoded to 3000, Kubernetes named port "http" maps to 3000. 
          When startup/liveness/readiness probes check the named port "http" (3000), they fail because 
          nothing is listening there, resulting in continuous RunContainerError or CrashLoopBackOff restarts.
          Mapping containerPort to the dynamic service port solves this mismatch.
          */}}
          ports:
            - name: app-http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "timeguild.fullname" . }}-config
            - secretRef:
                name: {{ include "timeguild.fullname" . }}-env-secrets
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: db-storage
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: app-http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /
              port: app-http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: app-http
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config-vol
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/rate-limiting.conf
              subPath: rate-limiting.conf
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/waf-rules.conf
              subPath: waf-rules.conf
            - name: nginx-config-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-tmp
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /tmp
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-config-vol
          configMap:
            name: {{ include "timeguild.fullname" . }}-nginx-config
      {{- if .Values.persistence.enabled }}
        - name: db-storage
          {{- if eq .Values.persistence.type "hostPath" }}
          hostPath:
            path: {{ .Values.persistence.hostPath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "timeguild.fullname" . }}-db-pvc
          {{- end }}
      {{- end }}
