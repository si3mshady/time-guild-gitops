replicaCount: 3

# Disable Stripe simulation sandbox mode for live transactions in production
config:
  NEXT_PUBLIC_STRIPE_TEST_MODE: "false"

ingress:
  className: "nginx" # Use production Nginx controller class instead of Traefik
  hosts:
    - host: prod.timeguild.xyz
      paths:
        - path: /
          pathType: Prefix
    - host: "*.prod.timeguild.xyz"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: timeguild-prod-tls
      hosts:
        - prod.timeguild.xyz
        - "*.prod.timeguild.xyz"

# Higher resource thresholds for production scale
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

persistence:
  storageClass: "local-path" # Use local-path storage class
  size: 5Gi

# Production secrets must be injected at deploy time via environment variables
# or decoupled secrets managers (e.g. Vault/SealedSecrets). 
# We nullify default values here to enforce security.
secrets:
  JWT_SECRET: ""
  STRIPE_SECRET_KEY: ""
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
  SUPABASE_PUBLISHABLE_KEY: ""
  DEEPSEEK_API_KEY: ""
