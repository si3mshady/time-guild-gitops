replicaCount: 1

autoscaling:
  enabled: false

ingress:
  annotations:
    cert-manager.io/cluster-issuer: null
  hosts:
    - host: dev.timeguild.local
      paths:
        - path: /
          pathType: Prefix
    - host: "*.dev.timeguild.local"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - dev.timeguild.local
        - "*.dev.timeguild.local"

# Development resource footprints
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
