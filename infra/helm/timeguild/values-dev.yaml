replicaCount: 1

autoscaling:
  enabled: false

ingress:
  annotations:
    cert-manager.io/cluster-issuer: null
  hosts:
    - host: timeguild.xyz
      paths:
        - path: /
          pathType: Prefix
    - host: "*.timeguild.xyz"
      paths:
        - path: /
          pathType: Prefix
  tls: null

# Development resource footprints
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  type: hostPath
  hostPath: "/var/lib/timeguild/data-dev"

podSecurityContext:
  runAsNonRoot: false

networkPolicy:
  enabled: false
